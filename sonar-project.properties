# sonar-project.properties
sonar.projectKey=final-project-ncc-kel3
sonar.projectName=Final Project NCC Kel3
sonar.projectVersion=1.0

# Source encoding
sonar.sourceEncoding=UTF-8

# Paths to analyse — one entry per service
sonar.modules=api,frontend,rule-engine

# Go API service
api.sonar.projectName=API (Go)
api.sonar.sources=services/api
api.sonar.exclusions=**/vendor/**
api.sonar.go.coverage.reportPaths=services/api/coverage.out

# Next.js frontend
frontend.sonar.projectName=Frontend (Next.js)
frontend.sonar.sources=services/frontend/src
frontend.sonar.exclusions=**/node_modules/**,**/.next/**
frontend.sonar.javascript.lcov.reportPaths=services/frontend/coverage/lcov.info

# Python rule-engine
rule-engine.sonar.projectName=Rule Engine (Python)
rule-engine.sonar.sources=services/rule-engine
rule-engine.sonar.exclusions=**/__pycache__/**,**/.venv/**
rule-engine.sonar.python.coverage.reportPaths=services/rule-engine/test-results/coverage.xml
